<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-secondary-subtle">
    <div class="container"> 

        <!--Header section-->
        <header class="d-flex  py-3 justify-content-center"> 
            <div class="d-flex align-items-center gap-2 me-auto">
            <a href="index.html" class="text-dark text-decoration-none fs-2">Riza Kaja</a>
            <span class="text-secondary">|</span>
            <span class="text-dark fs-5">Computer Engineer</span>
        </div>
            <ul class="nav nav-pills align-items-center"> 
            <li class="nav-item"><a href="resume.html" class="nav-link text-dark">Resume</a></li>
            <li class="nav-item text-secondary">|</li>
            <li class="nav-item"><a href="projects.html" class="nav-link text-dark">Projects</a></li>
            <li class="nav-item text-secondary">|</li>
            <li class="nav-item"><a href="contact.html" class="nav-link text-dark">Contact</a></li>
        </ul> 
        </header>


        <!--Hero section-->
        <div class="row align-items-center g-0 py-5"> 
            <div class="col-lg-7 text-left"> 
                <h1 class="display-4 fw-bold lh-1 text-body-emphasis mb-3">Contact Me</h1> 
                <p class="fs-4">Looking forward to hearing from you</p> 
                <h4 class=" fw-bold lh-1 text-body-emphasis mb-3">Phone</h4> 
                <p class=" fs-4">+355 67 730 7635</p> 
                <h4 class="fw-bold lh-1 text-body-emphasis mb-3">Email</h4> 
                <p class=" fs-4">rizakaja@yahoo.com</p> 
            </div> 
            <div class="col-md-10 mx-auto col-lg-5"> 
                <form class="p-4 p-md-5 border rounded-3 bg-body-tertiary">
                   <!-- Name + Last Name -->
            <div class="row g-2">
                <div class="col-md-6">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="firstName" required>
                        <label for="firstName">Name*</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="lastName" required>
                        <label for="lastName">Last Name*</label>
                    </div>
                </div>
            </div>

            <!-- Email + Subject -->
            <div class="row g-2 mt-2">
                <div class="col-md-6">
                    <div class="form-floating">
                        <input type="email" class="form-control" id="email">
                        <label for="email">Email address</label>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="subject">
                        <label for="subject">Subject</label>
                    </div>
                </div>
            </div>

            <br>
                    <div class="form-floating mb-3"> 
                        <input type="text" class="form-control" id="floatingInput" required> 
                        <label for="floatingInput">Message*</label> 
                    </div> 
                    
                    <button class="w-100 btn btn-lg btn-warning" type="submit">Submit</button> 
                    <hr class="my-4"> 
                    
            </div> 
        </div>

        <hr>

        <!--Footer section-->
        <footer class="py-3 my-4">
            <div class="d-flex justify-content-between align-items-center">
                <!-- Left side-->
                <div class="d-flex" style="gap: 10rem;">
                    <!-- Phone -->
                    <div>
                        <span class="fw-bold" style="font-size:x-large;">Phone</span><br>
                        <span class="text-body-secondary">+355 67 730 7635</span>
                    </div>
            
                    <!-- Email -->
                <div>
                <span class="fw-bold" style="font-size:x-large;">Email</span><br>
                <span class="text-body-secondary">rizakaja@yahoo.com</span>
            </div>
            
            <!-- Follow Me -->
                <div>
                    <span class="fw-bold" style="font-size:x-large;">Follow Me</span><br>
                    <div class="d-flex gap-3" style="font-size: 1.4rem;">
                        <a href="#" class="text-dark"><i class="bi bi-instagram"></i></a>
                        <a href="#" class="text-dark"><i class="bi bi-facebook"></i></a>
                        <a href="#" class="text-dark"><i class="bi bi-twitter-x"></i></a>
                    </div>
                </div>
            </div>
        
        <!-- Right side-->
        <div class="text-end">
            <span class="text-body-secondary">© 2026</span>
        </div>
    </div>
</footer>

</html>
